<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Maryuris 💖</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a1a; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        .mensaje {
            position: absolute; top: 18%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: clamp(24px, 5vw, 42px); font-weight: bold;
            text-align: center; z-index: 10; opacity: 0; transition: all 2s ease;
            text-shadow: 0 0 15px rgba(255,255,255,0.7); width: 85%;
        }
        .visible { opacity: 1; transform: translate(-50%, -30%); }
    </style>
</head>
<body>

<div id="mensaje" class="mensaje"></div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const divMensaje = document.getElementById('mensaje');
    
    let width, height, tiempo = 0, etapa = 0;
    const particulas = [], flores = [], estrellas = [], pajaros = [];
    const nombre = "MARYURIS";
    
    // Colores Neón Intensos
    const coloresNeon = ['#FF0055', '#00FFFF', '#FFFF00', '#FF00FF', '#00FF00', '#FF4400'];
    const frases = ["Te amo", "Eres la mejor", "Única", "Especial", "Mi motor", "Mi reina", "Linda", "Te extraño"];

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        crearEstrellas();
        crearJardin();
    }

    // --- CLASE PARTÍCULA MEJORADA (MÁS COMPACTA) ---
    class Particula {
        constructor(tx, ty) {
            this.x = width / 2;
            this.y = height / 2;
            this.tx = tx; 
            this.ty = ty;
            const angulo = Math.random() * Math.PI * 2;
            const fuerza = Math.random() * 15 + 5; 
            this.vx = Math.cos(angulo) * fuerza;
            this.vy = Math.sin(angulo) * fuerza;
            this.color = coloresNeon[Math.floor(Math.random() * coloresNeon.length)];
            this.friccion = 0.94; // Mayor fricción para agrupar más rápido
            this.ease = 0.05; // Atracción suave pero constante
        }
        update() {
            if (etapa >= 1) {
                // Atracción al punto objetivo
                let dx = this.tx - this.x;
                let dy = this.ty - this.y;
                this.vx += dx * this.ease;
                this.vy += dy * this.ease;
            }
            this.vx *= this.friccion;
            this.vy *= this.friccion;
            this.x += this.vx;
            this.y += this.vy;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            // Partículas un poco más grandes para rellenar
            ctx.arc(this.x, this.y, 2.5, 0, Math.PI*2);
            ctx.fill();
            if (etapa === 1) { 
                ctx.shadowBlur = 12;
                ctx.shadowColor = this.color;
            }
        }
    }

    // --- CLASE AVE CORREGIDA (SOLO UNA AVE) ---
    class Ave {
        constructor(texto) {
            this.x = width + 100;
            this.y = Math.random() * height * 0.4 + 40;
            this.v = Math.random() * 1 + 2; 
            this.txt = texto;
            this.fase = Math.random() * Math.PI;
        }
        draw() {
            this.x -= this.v;
            this.fase += 0.15;
            let yOff = Math.sin(this.fase) * 5;
            
            ctx.save();
            ctx.strokeStyle = "rgba(255,255,255,0.8)";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            // Ala izquierda
            ctx.moveTo(this.x, this.y + yOff);
            ctx.quadraticCurveTo(this.x - 10, this.y - 15 + yOff, this.x - 20, this.y + yOff);
            // Ala derecha
            ctx.moveTo(this.x, this.y + yOff);
            ctx.quadraticCurveTo(this.x + 10, this.y - 15 + yOff, this.x + 20, this.y + yOff);
            ctx.stroke();

            ctx.fillStyle = "white";
            ctx.font = "bold 18px Arial";
            ctx.textAlign = "center";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "white";
            ctx.fillText(this.txt, this.x, this.y + 35);
            ctx.restore();
        }
    }

    function crearEstrellas() {
        for(let i=0; i<100; i++) estrellas.push({x: Math.random()*width, y: Math.random()*height, s: Math.random()*1.5});
    }

    function crearNombre() {
        const fontSize = width < 600 ? 55 : 120; 
        ctx.font = `bold ${fontSize}px Arial`;
        const metrics = ctx.measureText(nombre);
        const startX = (width - metrics.width) / 2;
        const startY = height / 2 + fontSize / 2;
        
        for(let i=0; i<nombre.length; i++) {
            let letraX = startX + (i * (metrics.width / nombre.length));
            // Muchísimas más partículas para rellenar
            for(let j=0; j<60; j++) { 
                let px = letraX + Math.random() * (fontSize * 0.7);
                let py = startY + (Math.random() - 0.5) * fontSize * 0.9;
                particulas.push(new Particula(px, py));
            }
        }
    }

    function crearJardin() {
        const numFlores = width < 600 ? 15 : 25;
        for(let i=0; i<numFlores; i++) flores.push({
            x: (width/numFlores)*i + (width/numFlores/2), 
            c: coloresNeon[i % coloresNeon.length],
            a: Math.random() * 10
        });
    }

    // --- FUNCIÓN CLAVE: ADMINISTRADOR DE AVES SECUENCIAL ---
    let fraseIndex = 0;
    function lanzarSiguienteAve() {
        if (etapa >= 1) {
            pajaros.push(new Ave(frases[fraseIndex]));
            fraseIndex = (fraseIndex + 1) % frases.length;
            // Lanzar la siguiente ave en 3 segundos (3000ms)
            setTimeout(lanzarSiguienteAve, 3000);
        }
    }

    function dibujarEscena() {
        const g = ctx.createLinearGradient(0, 0, 0, height);
        g.addColorStop(0, `rgb(${10 + tiempo*10}, ${10 + tiempo*50}, ${30 + tiempo*150})`);
        g.addColorStop(0.5, `rgb(${255*tiempo}, ${100*tiempo}, ${50*tiempo})`);
        g.addColorStop(1, "#1a0a05");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = `rgba(255,255,255,${(1-tiempo) * Math.random()})`;
        estrellas.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

        let solY = height - (tiempo * height * 0.75);
        ctx.save();
        ctx.shadowBlur = 40 * tiempo;
        ctx.shadowColor = "orange";
        ctx.fillStyle = "#fffce0";
        ctx.beginPath(); ctx.arc(width/2, solY, 60, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        flores.forEach(f => {
            f.a += 0.04;
            let actualH = 60 * tiempo;
            ctx.strokeStyle = "#2d5a27";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(f.x, height);
            ctx.quadraticCurveTo(f.x, height - actualH, f.x + Math.sin(f.a)*5, height - actualH);
            ctx.stroke();
            if(tiempo > 0.7) {
                ctx.fillStyle = f.c;
                ctx.beginPath(); ctx.arc(f.x + Math.sin(f.a)*5, height - actualH, 8, 0, Math.PI*2); ctx.fill();
            }
        });

        ctx.fillStyle = "#0a2a0a";
        ctx.fillRect(0, height - 15, width, 15);

        if (tiempo > 0.8 && etapa === 0) {
            etapa = 1;
            crearNombre();
            divMensaje.innerHTML = "¡Buenos Días Princesa! 🌸";
            divMensaje.classList.add("visible");
            
            // Iniciar la cola secuencial de aves
            lanzarSiguienteAve();
            
            setTimeout(() => {
                divMensaje.innerHTML = "Que hoy todo sea bendición para ti.<br>Te amo ❤️";
            }, 7000);
        }

        ctx.shadowBlur = 0;
        particulas.forEach(p => { p.update(); p.draw(); });
        // Dibujar y limpiar aves que salen de pantalla
        pajaros.forEach((p, i) => { p.draw(); if(p.x < -150) pajaros.splice(i, 1); });

        if (tiempo < 1) tiempo += 0.003; 
        requestAnimationFrame(dibujarEscena);
    }

    window.addEventListener('resize', init);
    init();
    dibujarEscena();
</script>
</body>
</html>
