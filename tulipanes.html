<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tulipanes Para Maryuris 🌷❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #00001a, #220011, #550022);
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
        }
        .poema {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 28px;
            text-align: center;
            line-height: 1.6;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff0080, 0 0 30px #ff0080;
            z-index: 10;
            font-style: italic;
            opacity: 0;
            transition: opacity 1s ease;
        }
    </style>
</head>
<body>

<div id="poema" class="poema"></div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const poemaElement = document.getElementById('poema');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // --- EL POEMA ---
    const poema = `Tu belleza en mi alma se posa.
No hay jardín que se compare,
ni estrella que te acapare.

Eres el sueño hecho flor,
mi dulce y tierno amor.`;

    let letraIndex = 0;
    let crecimiento = 0;

    function escribirPoema() {
        if(letraIndex < poema.length) {
            poemaElement.innerHTML = poema.substring(0, letraIndex + 1).replace(/\n/g, '<br>');
            poemaElement.style.opacity = 1;
            letraIndex++;
            
            if(crecimiento < 100) {
                crecimiento += 0.7;
            }
            
            setTimeout(escribirPoema, 80);
        }
    }

    setTimeout(escribirPoema, 1000);


    // --- TULIPANES IGUAL QUE EN LA FOTO ---
    class Tulipan {
        constructor(x, colorFlor) {
            this.x = x;
            this.baseY = canvas.height;
            this.color = colorFlor;
        }

        draw(scale) {
            let alturaTotal = 250; // Tallo largo y bonito
            let altura = (scale / 100) * alturaTotal;
            let centroFlorY = this.baseY - altura;

            if(altura < 5) return;

            // 🌱 TALLO VERDE
            ctx.beginPath();
            ctx.moveTo(this.x, this.baseY);
            ctx.lineTo(this.x, centroFlorY);
            ctx.strokeStyle = '#2d992d';
            ctx.lineWidth = 7;
            ctx.lineCap = 'round';
            ctx.stroke();

            // 🍃 HOJAS
            if(scale > 30) {
                ctx.beginPath();
                ctx.ellipse(this.x - 20, centroFlorY + 50, 22, 12, -0.6, 0, Math.PI*2);
                ctx.ellipse(this.x + 20, centroFlorY + 70, 22, 12, 0.6, 0, Math.PI*2);
                ctx.fillStyle = '#44bb44';
                ctx.fill();
            }

            if(scale < 60) return;

            // 🌸 PETALOS (COMO EN LA FOTO)
            ctx.fillStyle = this.color;
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 10;

            // Pétalo de en medio
            ctx.beginPath();
            ctx.moveTo(this.x, centroFlorY - 10);
            ctx.bezierCurveTo(this.x, centroFlorY - 35, this.x - 20, centroFlorY - 35, this.x - 20, centroFlorY - 10);
            ctx.bezierCurveTo(this.x - 20, centroFlorY + 5, this.x, centroFlorY + 10, this.x, centroFlorY - 10);
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(this.x, centroFlorY - 10);
            ctx.bezierCurveTo(this.x, centroFlorY - 35, this.x + 20, centroFlorY - 35, this.x + 20, centroFlorY - 10);
            ctx.bezierCurveTo(this.x + 20, centroFlorY + 5, this.x, centroFlorY + 10, this.x, centroFlorY - 10);
            ctx.fill();

            // Base de la flor
            ctx.beginPath();
            ctx.arc(this.x, centroFlorY, 14, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
        }
    }

    // Colores iguales a la imagen (Rojo y Rosa)
    let tulipanes = [
        new Tulipan(canvas.width / 2 - 120, '#ff4d94'),
        new Tulipan(canvas.width / 2, '#e6005c'),
        new Tulipan(canvas.width / 2 + 120, '#ff4d94')
    ];


    // --- ESTRELLAS ---
    let estrellas = [];
    for(let i=0; i<250; i++) {
        estrellas.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            r: Math.random()*1.5 + 0.5
        });
    }

    function animar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = 'white';
        estrellas.forEach(e => {
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
            ctx.fill();
        });

        tulipanes.forEach(t => {
            t.draw(crecimiento);
        });

        requestAnimationFrame(animar);
    }

    animar();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

</script>

</body>
</html>
