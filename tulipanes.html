<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tulipanes Para Maryuris 🌷❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #000011, #220011, #661133);
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
        }
        .poema {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 26px;
            text-align: center;
            line-height: 1.6;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff0080, 0 0 30px #ff0080;
            z-index: 10;
            font-style: italic;
            opacity: 0;
            transition: opacity 1s ease;
        }
    </style>
</head>
<body>

<div id="poema" class="poema"></div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const poemaElement = document.getElementById('poema');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // --- EL POEMA ---
    const poema = `Tu belleza en mi alma se posa.
No hay jardín que se compare,
ni estrella que te acapare.

Eres el sueño hecho flor,
mi dulce y tierno amor.`;

    let letraIndex = 0;
    let crecimiento = 0;

    function escribirPoema() {
        if(letraIndex < poema.length) {
            poemaElement.innerHTML = poema.substring(0, letraIndex + 1).replace(/\n/g, '<br>');
            poemaElement.style.opacity = 1;
            letraIndex++;
            
            if(crecimiento < 100) {
                crecimiento += 0.6;
            }
            
            setTimeout(escribirPoema, 80);
        }
    }

    setTimeout(escribirPoema, 1000);


    // --- TULIPANES BONITOS Y REALISTAS ---
    class Tulipan {
        constructor(x, color) {
            this.x = x;
            this.baseY = canvas.height + 50;
            this.color = color;
        }

        draw(scale) {
            let alturaMax = 220;
            let altura = (scale / 100) * alturaMax;
            let centroY = this.baseY - altura;

            if(altura < 10) return;

            // TALLO VERDE LARGO
            ctx.beginPath();
            ctx.moveTo(this.x, this.baseY);
            ctx.lineTo(this.x, centroY - 40);
            ctx.strokeStyle = '#3a993a';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.stroke();

            // HOJAS
            ctx.beginPath();
            ctx.ellipse(this.x - 25, centroY + 20, 25, 12, -0.5, 0, Math.PI*2);
            ctx.ellipse(this.x + 25, centroY + 40, 25, 12, 0.5, 0, Math.PI*2);
            ctx.fillStyle = '#4ec94e';
            ctx.fill();

            if(scale < 50) return;

            // PETALOS GRANDES Y BONITOS
            ctx.fillStyle = this.color;
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 15;

            // Petalo central
            ctx.beginPath();
            ctx.ellipse(this.x, centroY - 40, 18, 28, 0, 0, Math.PI*2);
            ctx.fill();

            // Petalos de los lados
            ctx.beginPath();
            ctx.ellipse(this.x - 16, centroY - 35, 16, 24, -0.5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(this.x + 16, centroY - 35, 16, 24, 0.5, 0, Math.PI*2);
            ctx.fill();

            ctx.shadowBlur = 0;
        }
    }

    let tulipanes = [
        new Tulipan(canvas.width / 2 - 110, '#ff66b2'), // Rosa claro
        new Tulipan(canvas.width / 2, '#ff1a75'),      // Rojo fuerte
        new Tulipan(canvas.width / 2 + 110, '#ff66b2')  // Rosa claro
    ];


    // --- ESTRELLAS DE FONDO ---
    let estrellas = [];
    for(let i=0; i<250; i++) {
        estrellas.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            r: Math.random()*1.5 + 0.5,
            brillo: Math.random()
        });
    }


    // --- ANIMACIÓN ---
    function animar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Fondo estrellado
        ctx.fillStyle = 'white';
        estrellas.forEach(e => {
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
            ctx.fill();
        });

        // Dibujar tulipanes
        tulipanes.forEach(t => {
            t.draw(crecimiento);
        });

        requestAnimationFrame(animar);
    }

    animar();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        tulipanes[0].x = canvas.width / 2 - 110;
        tulipanes[1].x = canvas.width / 2;
        tulipanes[2].x = canvas.width / 2 + 110;
        tulipanes[0].baseY = canvas.height + 50;
        tulipanes[1].baseY = canvas.height + 50;
        tulipanes[2].baseY = canvas.height + 50;
    });

</script>

</body>
</html>
