<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para Maryuris ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #000022, #440022, #ff4444);
            font-family: 'Arial', sans-serif;
            cursor: pointer;
        }
        canvas {
            display: block;
        }
        .texto {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 50px;
            font-weight: bold;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff0080, 0 0 30px #ff0080;
            z-index: 10;
            text-align: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .visible {
            opacity: 1 !important;
        }
        .corazon-final {
            font-size: 100px !important;
            color: red;
            text-shadow: 0 0 20px red, 0 0 40px red, 0 0 60px red;
            animation: latido 1s infinite;
        }
        @keyframes latido {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>

<div id="mensaje" class="texto"></div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const mensaje = document.getElementById('mensaje');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // --- MENSAJES EN EL ORDEN QUE QUIERES ---
    const frases = [
        "Maryuris mi amor",
        "Eres maravillosa",
        "Única",
        "Tus ojos iluminan las estrellas",
        "❤️"
    ];
    let index = 0;

    function mostrarMensaje() {
        if(index < frases.length) {
            mensaje.innerText = frases[index];
            mensaje.classList.remove('corazon-final');
            
            if(index === frases.length - 1) {
                mensaje.classList.add('corazon-final');
            }
            
            mensaje.classList.add('visible');
            
            setTimeout(() => {
                mensaje.classList.remove('visible');
                index++;
                setTimeout(mostrarMensaje, 1000);
            }, 4000);
        }
    }
    setTimeout(mostrarMensaje, 1000);


    // --- ESTRELLAS QUE CAEN ---
    let estrellas = [];
    for(let i=0; i<150; i++) {
        estrellas.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            r: Math.random()*1.5 + 0.5,
            v: Math.random()*2 + 1
        });
    }

    // --- ESTRELLAS FUGACES (LAS QUE CRUZAN VOLANDO) ---
    class ShootingStar {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = 0;
            this.length = Math.random() * 80 + 60;
            this.speed = Math.random() * 5 + 4;
            this.angle = Math.PI / 4;
            this.opacity = 1;
        }
        update() {
            this.x += this.speed * Math.cos(this.angle);
            this.y += this.speed * Math.sin(this.angle);
            this.opacity -= 0.01;
            if(this.opacity <= 0) this.reset();
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(
                this.x - this.length * Math.cos(this.angle),
                this.y - this.length * Math.sin(this.angle)
            );
            ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    }

    let estrellasFugaces = [];
    setInterval(() => {
        estrellasFugaces.push(new ShootingStar());
    }, 3000);


    // --- FUEGOS ARTIFICIALES ---
    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.speed = Math.random() * 6 + 3;
            this.angle = Math.random() * Math.PI * 2;
            this.color = color;
            this.opacity = 1;
            this.gravity = 0.05;
        }
        update() {
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed + this.gravity;
            this.opacity -= 0.015;
            this.speed *= 0.98;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2.5, 0, Math.PI*2);
            ctx.fillStyle = this.color.replace(')', `, ${this.opacity})`).replace('rgb', 'rgba');
            ctx.fill();
        }
    }

    let particulas = [];
    const colores = [
        'rgb(255,0,0)', 'rgb(0,255,0)', 'rgb(0,0,255)', 
        'rgb(255,255,0)', 'rgb(255,0,255)', 'rgb(0,255,255)'
    ];

    function crearFuegos(e) {
        let x = e.clientX || e.touches[0].clientX;
        let y = e.clientY || e.touches[0].clientY;
        
        for(let i=0; i<80; i++) {
            let color = colores[Math.floor(Math.random() * colores.length)];
            particulas.push(new Particle(x, y, color));
        }
    }
    canvas.addEventListener('click', crearFuegos);
    canvas.addEventListener('touchstart', crearFuegos);


    // --- ANIMACIÓN PRINCIPAL ---
    function animar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Dibujar estrellas fijas
        ctx.fillStyle = 'white';
        estrellas.forEach(e => {
            e.y += e.v;
            if(e.y > canvas.height) {
                e.y = -5;
                e.x = Math.random()*canvas.width;
            }
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
            ctx.fill();
        });

        // Dibujar estrellas fugaces
        estrellasFugaces.forEach(estrella => {
            estrella.update();
            estrella.draw();
        });

        // Dibujar fuegos artificiales
        particulas.forEach((p, index) => {
            p.update();
            p.draw();
            if(p.opacity <= 0) particulas.splice(index, 1);
        });

        requestAnimationFrame(animar);
    }

    animar();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

</script>

</body>
</html>
