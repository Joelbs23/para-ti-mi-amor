<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Princesa 🌅</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        .mensaje {
            position: absolute; top: 22%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: clamp(20px, 4.5vw, 38px); font-weight: bold;
            text-align: center; z-index: 10; opacity: 0; transition: all 2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 0 20px rgba(255,255,255,0.5); width: 85%;
        }
        .visible { opacity: 1; transform: translate(-50%, -40%); }
    </style>
</head>
<body>

<div id="mensaje" class="mensaje"></div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const divMensaje = document.getElementById('mensaje');
    
    let width, height, tiempo = 0, etapa = 0;
    const particulas = [], flores = [], estrellas = [], pajaros = [];
    const nombre = "MARYURIS";
    const frases = ["Te amo", "Eres la mejor", "Única", "Especial", "Mi motor", "Mi reina"];

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        crearEstrellas();
        crearJardin();
    }

    // --- FÍSICA AVANZADA ---
    class Particula {
        constructor(tx, ty) {
            // Empiezan en el centro con una explosión
            this.x = width / 2;
            this.y = height / 2;
            this.tx = tx; 
            this.ty = ty;
            // Velocidad inicial explosiva
            const angulo = Math.random() * Math.PI * 2;
            const fuerza = Math.random() * 15 + 5;
            this.vx = Math.cos(angulo) * fuerza;
            this.vy = Math.sin(angulo) * fuerza;
            
            this.color = `hsl(${Math.random() * 50 + 330}, 100%, 75%)`; // Tonos rosados/neón
            this.friccion = 0.95;
            this.resorte = 0.04; // Fuerza de atracción al objetivo
        }
        update() {
            if (etapa >= 1) {
                // Atracción elástica al punto del nombre
                let dx = this.tx - this.x;
                let dy = this.ty - this.y;
                this.vx += dx * this.resorte;
                this.vy += dy * this.resorte;
            }
            this.vx *= this.friccion;
            this.vy *= this.friccion;
            this.x += this.vx;
            this.y += this.vy;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 1.8, 0, Math.PI*2);
            ctx.fill();
            if (etapa === 1) { // Brillo extra cuando forman el nombre
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
            }
        }
    }

    class Ave {
        constructor() {
            this.x = width + 100;
            this.y = Math.random() * height * 0.4 + 40;
            this.v = Math.random() * 1.5 + 2.5;
            this.txt = frases[Math.floor(Math.random()*frases.length)];
            this.fase = Math.random() * Math.PI;
        }
        draw() {
            this.x -= this.v;
            this.fase += 0.15;
            let yOff = Math.sin(this.fase) * 6;
            
            ctx.save();
            ctx.strokeStyle = "rgba(255,255,255,0.8)";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            // Ala izquierda
            ctx.moveTo(this.x, this.y + yOff);
            ctx.bezierCurveTo(this.x - 10, this.y - 15 + yOff, this.x - 25, this.y + yOff, this.x - 30, this.y + 5 + yOff);
            // Ala derecha
            ctx.moveTo(this.x, this.y + yOff);
            ctx.bezierCurveTo(this.x + 10, this.y - 15 + yOff, this.x + 25, this.y + yOff, this.x + 30, this.y + 5 + yOff);
            ctx.stroke();

            ctx.fillStyle = "white";
            ctx.font = "bold 18px 'Segoe UI'";
            ctx.textAlign = "center";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "white";
            ctx.fillText(this.txt, this.x, this.y + 40);
            ctx.restore();
        }
    }

    function crearEstrellas() {
        for(let i=0; i<120; i++) estrellas.push({x: Math.random()*width, y: Math.random()*height, s: Math.random()*1.5});
    }

    function crearNombre() {
        const fontSize = width < 600 ? 50 : 100;
        ctx.font = `bold ${fontSize}px Arial`;
        const metrics = ctx.measureText(nombre);
        const startX = (width - metrics.width) / 2;
        const startY = height / 2 + 50;
        
        // Creamos puntos para las partículas basándonos en el texto real
        for(let i=0; i<nombre.length; i++) {
            let letraX = startX + (i * (metrics.width / nombre.length));
            for(let j=0; j<40; j++) { // Densidad de partículas
                let px = letraX + Math.random() * (fontSize * 0.6);
                let py = startY + (Math.random() - 0.5) * fontSize;
                particulas.push(new Particula(px, py));
            }
        }
    }

    function crearJardin() {
        const numFlores = width < 600 ? 15 : 30;
        for(let i=0; i<numFlores; i++) flores.push({
            x: (width/numFlores)*i + (Math.random()*20), 
            c: `hsl(${Math.random()*60 + 300}, 80%, 70%)`,
            a: Math.random() * Math.PI,
            h: Math.random() * 40 + 60
        });
    }

    function dibujarEscena() {
        // Cielo: Transición de azul profundo a naranja amanecer
        const g = ctx.createLinearGradient(0, 0, 0, height);
        g.addColorStop(0, `rgb(${5 + tiempo*30}, ${5 + tiempo*80}, ${20 + tiempo*180})`);
        g.addColorStop(0.6, `rgb(${255*tiempo}, ${120*tiempo}, ${60*tiempo})`);
        g.addColorStop(1, `rgb(${255*tiempo}, ${180*tiempo}, ${100*tiempo})`);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, width, height);

        // Estrellas titilantes
        ctx.fillStyle = `rgba(255,255,255,${(1-tiempo) * Math.random()})`;
        estrellas.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

        // Sol con resplandor suave
        let solY = height - (tiempo * height * 0.75);
        let solSize = 65 + Math.sin(Date.now()*0.003)*5;
        ctx.save();
        ctx.shadowBlur = 50 * tiempo;
        ctx.shadowColor = "rgba(255, 200, 0, 0.8)";
        ctx.fillStyle = "#fffce0";
        ctx.beginPath(); ctx.arc(width/2, solY, solSize, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        // Lógica de etapas
        if (tiempo > 0.85 && etapa === 0) {
            etapa = 1;
            crearNombre();
            divMensaje.innerHTML = "¡Buenos Días Princesa! 🌸";
            divMensaje.classList.add("visible");
            setTimeout(() => {
                etapa = 2;
                divMensaje.innerHTML = "Que hoy todo sea bendición para ti.<br>Te amo ❤️";
                // Empezar a generar aves
                setInterval(() => { if(pajaros.length < 5) pajaros.push(new Ave()); }, 3000);
            }, 6000);
        }

        // Dibujar Partículas con rastro
        particulas.forEach(p => { p.update(); p.draw(); });

        // Aves
        pajaros.forEach((p, i) => { 
            p.draw(); 
            if(p.x < -150) pajaros.splice(i, 1); 
        });

        // Flores y Suelo
        flores.forEach(f => {
            f.a += 0.04;
            let actualH = f.h * tiempo;
            ctx.strokeStyle = "#1b4d16";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(f.x, height);
            ctx.quadraticCurveTo(f.x + Math.sin(f.a)*10, height - actualH/2, f.x + Math.sin(f.a)*5, height - actualH);
            ctx.stroke();
            if(tiempo > 0.7) {
                ctx.fillStyle = f.c;
                ctx.beginPath(); ctx.arc(f.x + Math.sin(f.a)*5, height - actualH, 10, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "yellow";
                ctx.beginPath(); ctx.arc(f.x + Math.sin(f.a)*5, height - actualH, 4, 0, Math.PI*2); ctx.fill();
            }
        });

        ctx.fillStyle = "#051a05";
        ctx.fillRect(0, height - 15, width, 15);

        if (tiempo < 1) tiempo += 0.004;
        requestAnimationFrame(dibujarEscena);
    }

    window.addEventListener('resize', init);
    init();
    dibujarEscena();
</script>
</body>
</html>
