<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Maryuris 💖</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010103; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        .mensaje {
            position: absolute; top: 18%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: clamp(22px, 5vw, 38px); font-weight: bold;
            text-align: center; z-index: 10; opacity: 0; transition: all 2s ease;
            text-shadow: 0 0 20px rgba(255,255,255,0.7); width: 85%;
        }
        .visible { opacity: 1; transform: translate(-50%, -30%); }
    </style>
</head>
<body>

<div id="mensaje" class="mensaje"></div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const divMensaje = document.getElementById('mensaje');
    
    let width, height, tiempo = 0, etapa = 0;
    const particulas = [], flores = [], estrellas = [], pajaros = [];
    const nombre = "MARYURIS";
    
    const coloresNeon = ['#FF0055', '#00FFFF', '#FFFF00', '#FF00FF', '#00FF00', '#FF4400'];
    const frases = ["Te amo", "Eres la mejor", "Única", "Especial", "Mi motor", "Mi reina", "Hermosa", "Mi sol"];

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        crearEstrellas();
        crearJardin();
    }

    class Particula {
        constructor(tx, ty) {
            this.x = width / 2;
            this.y = height / 2;
            this.tx = tx; 
            this.ty = ty;
            this.dx = this.tx - this.x;
            this.dy = this.ty - this.y;
            this.distancia = Math.sqrt(this.dx*this.dx + this.dy*this.dy);
            this.pasosTotales = 120; // Llegada en 2 segundos aprox
            this.vx = this.dx / this.pasosTotales;
            this.vy = this.dy / this.pasosTotales;
            this.color = coloresNeon[Math.floor(Math.random() * coloresNeon.length)];
            this.llegó = false;
        }
        update() {
            if (etapa >= 1 && !this.llegó) {
                this.x += this.vx;
                this.y += this.vy;
                if (Math.abs(this.x - this.tx) < Math.abs(this.vx)) {
                    this.x = this.tx;
                    this.y = this.ty;
                    this.llegó = true;
                }
            }
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2.5, 0, Math.PI*2);
            ctx.fill();
            if (this.llegó) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
            }
        }
    }

    class Ave {
        constructor(texto) {
            this.x = width + 100;
            this.y = Math.random() * height * 0.35 + 50;
            this.v = Math.random() * 1 + 2; 
            this.txt = texto;
            this.fase = Math.random() * Math.PI;
        }
        draw() {
            this.x -= this.v;
            this.fase += 0.12;
            let yOff = Math.sin(this.fase) * 8;
            
            ctx.save();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(this.x - 15, this.y + yOff);
            ctx.quadraticCurveTo(this.x, this.y - 12 + yOff, this.x + 15, this.y + yOff);
            ctx.stroke();

            ctx.fillStyle = "white";
            ctx.font = "bold 18px Arial";
            ctx.textAlign = "center";
            ctx.shadowBlur = 8;
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.fillText(this.txt, this.x, this.y + 35);
            ctx.restore();
        }
    }

    function crearEstrellas() {
        for(let i=0; i<100; i++) estrellas.push({x: Math.random()*width, y: Math.random()*height, s: Math.random()*1.5});
    }

    function crearNombre() {
        particulas.length = 0;
        const fontSize = width < 600 ? 50 : 110; 
        ctx.font = `bold ${fontSize}px Arial`;
        const metrics = ctx.measureText(nombre);
        const startX = (width - metrics.width) / 2;
        const startY = height * 0.45; 
        
        for(let i=0; i<nombre.length; i++) {
            let letraX = startX + (i * (metrics.width / nombre.length));
            for(let j=0; j<65; j++) { 
                let px = letraX + Math.random() * (fontSize * 0.65);
                let py = startY + (Math.random() - 0.5) * fontSize * 0.9;
                particulas.push(new Particula(px, py));
            }
        }
    }

    // --- FUNCIÓN CLAVE: LANZAR AVES UNA A UNA ---
    let fraseIndex = 0;
    function lanzarSiguienteAve() {
        if (etapa >= 1) {
            pajaros.push(new Ave(frases[fraseIndex]));
            fraseIndex = (fraseIndex + 1) % frases.length;
            // Esperar entre 3 y 5 segundos para la siguiente ave
            setTimeout(lanzarSiguienteAve, 3000 + Math.random() * 2000);
        }
    }

    function crearJardin() {
        const numFlores = 20;
        for(let i=0; i<numFlores; i++) flores.push({
            x: (width/numFlores)*i + 10, 
            c: coloresNeon[i % coloresNeon.length],
            a: Math.random() * Math.PI,
            h: Math.random() * 30 + 50
        });
    }

    function dibujarEscena() {
        const g = ctx.createLinearGradient(0, 0, 0, height);
        g.addColorStop(0, `rgb(${2 + tiempo*10}, ${2 + tiempo*30}, ${10 + tiempo*50})`);
        g.addColorStop(0.5, `rgb(${255*tiempo}, ${100*tiempo}, ${50*tiempo})`);
        g.addColorStop(1, `rgb(${255*tiempo}, ${180*tiempo}, ${100*tiempo})`);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = `rgba(255,255,255,${(1-tiempo) * Math.random()})`;
        estrellas.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

        let solY = height - (tiempo * height * 0.75);
        ctx.save();
        ctx.shadowBlur = 40 * tiempo;
        ctx.shadowColor = "orange";
        ctx.fillStyle = "#fffce0";
        ctx.beginPath(); ctx.arc(width/2, solY, 60, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        if (tiempo > 0.6 && etapa === 0) {
            etapa = 1;
            crearNombre();
            divMensaje.innerHTML = "¡Buenos Días Princesa! 🌸";
            divMensaje.classList.add("visible");
            lanzarSiguienteAve(); // Inicia la cadena de aves una a una
            setTimeout(() => {
                divMensaje.innerHTML = "Que hoy todo sea bendición para ti.<br>Te amo ❤️";
            }, 6000);
        }

        ctx.shadowBlur = 0;
        particulas.forEach(p => { p.update(); p.draw(); });
        pajaros.forEach((p, i) => { p.draw(); if(p.x < -150) pajaros.splice(i, 1); });

        flores.forEach(f => {
            f.a += 0.04;
            let actualH = f.h * tiempo;
            ctx.strokeStyle = "#1b4d16";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(f.x, height);
            ctx.quadraticCurveTo(f.x, height - actualH, f.x + Math.sin(f.a)*5, height - actualH);
            ctx.stroke();
        });

        ctx.fillStyle = "#051a05";
        ctx.fillRect(0, height - 15, width, 15);

        if (tiempo < 1) tiempo += 0.003; 
        requestAnimationFrame(dibujarEscena);
    }

    window.addEventListener('resize', init);
    init();
    dibujarEscena();
</script>
</body>
</html>
