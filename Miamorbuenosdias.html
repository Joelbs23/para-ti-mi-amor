<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Princesa 🌅</title>
    <style>
        /* Ajuste 1: Fondo base más oscuro para contraste inmediato */
        body { margin: 0; overflow: hidden; background: #010103; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        .mensaje {
            position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: clamp(20px, 4.5vw, 38px); font-weight: bold;
            text-align: center; z-index: 10; opacity: 0; transition: all 2s ease;
            text-shadow: 0 0 15px rgba(255,255,255,0.6); width: 85%;
        }
        .visible { opacity: 1; transform: translate(-50%, -35%); }
    </style>
</head>
<body>

<div id="mensaje" class="mensaje"></div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const divMensaje = document.getElementById('mensaje');
    
    let width, height, tiempo = 0, etapa = 0;
    const particulas = [], flores = [], estrellas = [], pajaros = [];
    const nombre = "MARYURIS";
    // Ajuste 2: Colores neón más saturados y vibrantes
    const coloresNeon = ['#FF007F', '#FF1493', '#FF00FF', '#00FFFF', '#FFFF00', '#FF4500'];
    const frases = ["Te amo", "Eres la mejor", "Única", "Especial", "Mi motor", "Mi reina"];

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        crearEstrellas();
        crearJardin();
    }

    // --- FÍSICA MEJORADA ---
    class Particula {
        constructor(tx, ty) {
            this.x = width / 2;
            this.y = height / 2;
            this.tx = tx; 
            this.ty = ty;
            const angulo = Math.random() * Math.PI * 2;
            const fuerza = Math.random() * 20 + 8; // Más explosivo
            this.vx = Math.cos(angulo) * fuerza;
            this.vy = Math.sin(angulo) * fuerza;
            
            // Ajuste 3: Colores neón aleatorios de la lista saturada
            this.color = coloresNeon[Math.floor(Math.random() * coloresNeon.length)]; 
            this.friccion = 0.96;
            this.resorte = 0.05; // Atracción más rápida
        }
        update() {
            if (etapa >= 1) {
                let dx = this.tx - this.x;
                let dy = this.ty - this.y;
                this.vx += dx * this.resorte;
                this.vy += dy * this.resorte;
            }
            this.vx *= this.friccion;
            this.vy *= this.friccion;
            this.x += this.vx;
            this.y += this.vy;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            // Ajuste 4: Partículas un poco más grandes para que se noten
            ctx.arc(this.x, this.y, 2.2, 0, Math.PI*2);
            ctx.fill();
            if (etapa === 1) { 
                // Ajuste 5: Brillo neón intenso
                ctx.shadowBlur = 12;
                ctx.shadowColor = this.color;
            }
        }
    }

    class Ave {
        constructor() {
            this.x = width + 100;
            this.y = Math.random() * height * 0.4 + 40;
            this.v = Math.random() * 1.5 + 2.5;
            this.txt = frases[Math.floor(Math.random()*frases.length)];
            this.fase = Math.random() * Math.PI;
        }
        draw() {
            this.x -= this.v;
            this.fase += 0.15;
            let yOff = Math.sin(this.fase) * 6;
            
            ctx.save();
            ctx.strokeStyle = "rgba(255,255,255,0.8)";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y + yOff);
            ctx.bezierCurveTo(this.x - 10, this.y - 15 + yOff, this.x - 25, this.y + yOff, this.x - 30, this.y + 5 + yOff);
            ctx.moveTo(this.x, this.y + yOff);
            ctx.bezierCurveTo(this.x + 10, this.y - 15 + yOff, this.x + 25, this.y + yOff, this.x + 30, this.y + 5 + yOff);
            ctx.stroke();

            ctx.fillStyle = "white";
            ctx.font = "bold 18px 'Segoe UI'";
            ctx.textAlign = "center";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "white";
            ctx.fillText(this.txt, this.x, this.y + 40);
            ctx.restore();
        }
    }

    function crearEstrellas() {
        for(let i=0; i<120; i++) estrellas.push({x: Math.random()*width, y: Math.random()*height, s: Math.random()*1.5});
    }

    function crearNombre() {
        particulas.length = 0; // Limpiar si redimensionan
        const fontSize = width < 600 ? 55 : 110; // Letras un poco más grandes
        ctx.font = `bold ${fontSize}px Arial`;
        const metrics = ctx.measureText(nombre);
        const startX = (width - metrics.width) / 2;
        // Ajuste 6: Posicionar el nombre sobre el cielo más oscuro (mitad superior)
        const startY = height / 2 - 50; 
        
        for(let i=0; i<nombre.length; i++) {
            let letraX = startX + (i * (metrics.width / nombre.length));
            // Ajuste 7: Muchísimas más partículas para rellenar bien la letra
            for(let j=0; j<60; j++) { 
                let px = letraX + Math.random() * (fontSize * 0.7);
                let py = startY + (Math.random() - 0.5) * fontSize * 0.9;
                particulas.push(new Particula(px, py));
            }
        }
    }

    function crearJardin() {
        const numFlores = width < 600 ? 15 : 30;
        for(let i=0; i<numFlores; i++) flores.push({
            x: (width/numFlores)*i + (Math.random()*20), 
            c: `hsl(${Math.random()*60 + 300}, 80%, 70%)`,
            a: Math.random() * Math.PI,
            h: Math.random() * 40 + 60
        });
    }

    function dibujarEscena() {
        // Cielo: Transición más dramática (noche -> amanecer neón)
        const g = ctx.createLinearGradient(0, 0, 0, height);
        // Ajuste 8: Parte superior mucho más oscura para que el neón resalte
        g.addColorStop(0, `rgb(${3 + tiempo*10}, ${3 + tiempo*30}, ${10 + tiempo*60})`);
        g.addColorStop(0.5, `rgb(${255*tiempo}, ${80*tiempo}, ${40*tiempo})`); // Naranja neón intermedio
        g.addColorStop(1, `rgb(${255*tiempo}, ${180*tiempo}, ${100*tiempo})`); // Base clara
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, width, height);

        // Estrellas titilantes
        ctx.fillStyle = `rgba(255,255,255,${(1-tiempo) * Math.random()})`;
        estrellas.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

        // Sol con resplandor suave
        let solY = height - (tiempo * height * 0.75);
        let solSize = 65 + Math.sin(Date.now()*0.003)*5;
        ctx.save();
        ctx.shadowBlur = 50 * tiempo;
        ctx.shadowColor = "rgba(255, 180, 0, 0.7)";
        ctx.fillStyle = "#fffce0";
        ctx.beginPath(); ctx.arc(width/2, solY, solSize, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        // Lógica de etapas
        if (tiempo > 0.8 && etapa === 0) { // Etapa empieza antes
            etapa = 1;
            crearNombre();
            divMensaje.innerHTML = "¡Buenos Días Princesa! 🌸";
            divMensaje.classList.add("visible");
            setTimeout(() => {
                etapa = 2;
                divMensaje.innerHTML = "Que hoy todo sea bendición para ti.<br>Te amo ❤️";
                setInterval(() => { if(pajaros.length < 5) pajaros.push(new Ave()); }, 3000);
            }, 7000);
        }

        // Dibujar Partículas con rastro
        particulas.forEach(p => { p.update(); p.draw(); });

        // Aves
        pajaros.forEach((p, i) => { 
            p.draw(); 
            if(p.x < -150) pajaros.splice(i, 1); 
        });

        // Flores y Suelo
        flores.forEach(f => {
            f.a += 0.04;
            let actualH = f.h * tiempo;
            ctx.strokeStyle = "#1b4d16";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(f.x, height);
            ctx.quadraticCurveTo(f.x + Math.sin(f.a)*10, height - actualH/2, f.x + Math.sin(f.a)*5, height - actualH);
            ctx.stroke();
            if(tiempo > 0.7) {
                ctx.fillStyle = f.c;
                ctx.beginPath(); ctx.arc(f.x + Math.sin(f.a)*5, height - actualH, 10, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "yellow";
                ctx.beginPath(); ctx.arc(f.x + Math.sin(f.a)*5, height - actualH, 4, 0, Math.PI*2); ctx.fill();
            }
        });

        ctx.fillStyle = "#051a05";
        ctx.fillRect(0, height - 15, width, 15);

        // Ajuste 9: Transición del amanecer ligeramente más lenta para disfrutar el nombre
        if (tiempo < 1) tiempo += 0.0035; 
        requestAnimationFrame(dibujarEscena);
    }

    window.addEventListener('resize', init);
    init();
    dibujarEscena();
</script>
</body>
</html>
